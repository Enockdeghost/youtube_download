<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YouTube Downloader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { transition: width 0.3s ease; }
        button, .clickable { min-height: 44px; min-width: 44px; }
        @media (max-width: 640px) {
            .modal-content {
                width: 90%;
                max-width: none;
                margin: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans antialiased">
    <div class="container mx-auto px-3 sm:px-4 py-4 sm:py-8 max-w-4xl">
        <header class="text-center mb-4 sm:mb-8">
            <h1 class="text-3xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-1 sm:mb-2">
                🎬 Downloader Pro
            </h1>
            <p class="text-sm sm:text-lg text-gray-600 px-2">Paste any link – YouTube, Vimeo, Facebook, Twitch & more</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl p-4 sm:p-6 mb-4 sm:mb-6 border border-white/50">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="videoUrl" placeholder="Paste video URL..." 
                       class="flex-1 px-4 py-3 sm:px-5 sm:py-4 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-400 transition text-base sm:text-lg">
                <button onclick="fetchInfo()" id="fetchBtn" 
                        class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-3 sm:px-8 sm:py-4 rounded-xl font-semibold hover:from-blue-700 hover:to-indigo-700 transition shadow-md hover:shadow-lg flex items-center justify-center gap-2 text-base">
                    <span>Analyze</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 9l3 3m0 0l-3 3m3-3H8m13 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden flex justify-center items-center py-8 sm:py-12">
            <div class="loader"></div>
            <span class="ml-3 text-gray-500 text-sm sm:text-base">Fetching information...</span>
        </div>

        <!-- Error -->
        <div id="error" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-3 sm:p-4 mb-4 sm:mb-6 rounded-md shadow-sm text-sm sm:text-base"></div>

        <!-- Playlist View -->
        <div id="playlistView" class="hidden fade-in mb-4 sm:mb-6">
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-3 sm:mb-4 px-1" id="playlistTitle"></h2>
            <div id="videosList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4"></div>
        </div>

        <!-- Single Video View -->
        <div id="videoView" class="hidden fade-in">
            <!-- Video Details Card -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-4 sm:mb-6 border border-white/50">
                <div class="flex flex-col sm:flex-row">
                    <div class="sm:w-1/3">
                        <img id="thumbnail" src="" alt="Video thumbnail" class="w-full h-40 sm:h-48 object-cover">
                    </div>
                    <div class="sm:w-2/3 p-4 sm:p-6">
                        <h2 id="videoTitle" class="text-lg sm:text-2xl font-bold text-gray-800 mb-1 sm:mb-2 line-clamp-2"></h2>
                        <p id="duration" class="text-gray-500 mb-2 flex items-center gap-1 text-sm sm:text-base">
                            <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span></span>
                        </p>
                        <p class="text-xs sm:text-sm text-gray-400">Supported by yt-dlp (1000+ sites)</p>
                    </div>
                </div>
            </div>

            <!-- Formats -->
            <h3 class="text-lg sm:text-xl font-semibold text-gray-700 mb-3 sm:mb-4 px-1">Available Formats</h3>
            <div id="formatsContainer" class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4"></div>
        </div>
    </div>

    <!-- Download Progress Modal -->
    <div id="progressModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-2xl p-5 sm:p-8 w-full max-w-sm sm:max-w-md modal-content">
            <h3 class="text-lg sm:text-xl font-bold mb-4">Downloading...</h3>
            <div class="w-full bg-gray-200 rounded-full h-3 sm:h-4 mb-2">
                <div id="progressBar" class="bg-blue-600 h-3 sm:h-4 rounded-full progress-bar" style="width: 0%"></div>
            </div>
            <p id="progressStatus" class="text-xs sm:text-sm text-gray-600 mb-4">Starting...</p>
            <button onclick="cancelDownload()" class="text-red-500 hover:text-red-700 text-sm sm:text-base">Cancel</button>
        </div>
    </div>

    <script>
        // State
        let currentTaskId = null;
        let pollInterval = null;
        let currentVideoUrl = null;

        // Elements
        const urlInput = document.getElementById('videoUrl');
        const fetchBtn = document.getElementById('fetchBtn');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const playlistView = document.getElementById('playlistView');
        const videoView = document.getElementById('videoView');
        const playlistTitle = document.getElementById('playlistTitle');
        const videosList = document.getElementById('videosList');
        const thumbnail = document.getElementById('thumbnail');
        const videoTitle = document.getElementById('videoTitle');
        const durationSpan = document.querySelector('#duration span');
        const formatsContainer = document.getElementById('formatsContainer');
        const progressModal = document.getElementById('progressModal');
        const progressBar = document.getElementById('progressBar');
        const progressStatus = document.getElementById('progressStatus');

        // Helper: handle fetch response, parse JSON safely
        async function handleResponse(response) {
            const contentType = response.headers.get('content-type');
            if (!response.ok) {
                // Try to get error message from JSON, otherwise use status text
                if (contentType && contentType.includes('application/json')) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error ${response.status}`);
                } else {
                    // Not JSON – likely HTML error page
                    const text = await response.text();
                    // Extract title or first line for a concise error
                    const match = text.match(/<title>(.*?)<\/title>/);
                    const title = match ? match[1] : text.substring(0, 200);
                    throw new Error(`Server error (${response.status}): ${title}`);
                }
            }
            if (contentType && contentType.includes('application/json')) {
                return response.json();
            } else {
                // Unexpected non-JSON success response
                const text = await response.text();
                throw new Error(`Unexpected response format: ${text.substring(0, 100)}`);
            }
        }

        // Fetch video info
        async function fetchInfo() {
            const url = urlInput.value.trim();
            if (!url) {
                showError('Please enter a URL');
                return;
            }

            hideError();
            playlistView.classList.add('hidden');
            videoView.classList.add('hidden');
            loadingDiv.classList.remove('hidden');
            fetchBtn.disabled = true;

            try {
                const response = await fetch('/get_info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await handleResponse(response);
                
                if (data.type === 'playlist') {
                    displayPlaylist(data);
                } else if (data.type === 'video') {
                    displayVideo(data, url);
                } else {
                    throw new Error('Unknown response type');
                }
            } catch (error) {
                showError(error.message);
            } finally {
                loadingDiv.classList.add('hidden');
                fetchBtn.disabled = false;
            }
        }

        function displayPlaylist(data) {
            playlistTitle.textContent = data.title || 'Playlist';
            videosList.innerHTML = '';
            data.videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl overflow-hidden shadow-md hover:shadow-lg transition cursor-pointer border border-gray-100';
                card.innerHTML = `
                    <img src="${video.thumbnail || 'https://via.placeholder.com/320x180'}" class="w-full h-28 sm:h-32 object-cover">
                    <div class="p-2 sm:p-3">
                        <p class="font-semibold text-gray-800 text-sm sm:text-base truncate">${video.title}</p>
                        <p class="text-xs sm:text-sm text-gray-500">${formatDuration(video.duration)}</p>
                    </div>
                `;
                card.addEventListener('click', () => fetchVideoInfo(video.url));
                videosList.appendChild(card);
            });
            playlistView.classList.remove('hidden');
        }

        async function fetchVideoInfo(url) {
            loadingDiv.classList.remove('hidden');
            playlistView.classList.add('hidden');
            try {
                const response = await fetch('/get_info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await handleResponse(response);
                displayVideo(data, url);
            } catch (error) {
                showError(error.message);
                playlistView.classList.remove('hidden');
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }

        function displayVideo(info, videoUrl) {
            currentVideoUrl = videoUrl;

            thumbnail.src = info.thumbnail || 'https://via.placeholder.com/640x360';
            videoTitle.textContent = info.title;
            durationSpan.textContent = formatDuration(info.duration);

            formatsContainer.innerHTML = '';
            info.formats.forEach(format => {
                const filesize = format.filesize ? (format.filesize / 1024 / 1024).toFixed(2) + ' MB' : 'Unknown size';
                const isMerged = format.format_id === 'bestvideo+bestaudio';
                
                let typeLabel = 'Unknown';
                if (format.vcodec !== 'none' && format.acodec !== 'none') typeLabel = 'Video+Audio';
                else if (format.vcodec !== 'none') typeLabel = 'Video only';
                else if (format.acodec !== 'none') typeLabel = 'Audio only';

                let details = [];
                if (format.vcodec && format.vcodec !== 'none') details.push(`Video: ${format.vcodec.split('.')[0]}`);
                if (format.acodec && format.acodec !== 'none') details.push(`Audio: ${format.acodec.split('.')[0]}`);
                if (format.fps) details.push(`${format.fps} fps`);
                if (format.audio_channels) details.push(`${format.audio_channels} ch`);
                if (format.tbr) details.push(`${Math.round(format.tbr)} kbps`);
                const detailStr = details.join(' • ');

                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl p-3 sm:p-5 border border-gray-100 hover:border-blue-200 hover:shadow-md transition flex flex-col format-card';
                
                let containerSelector = '';
                if (isMerged) {
                    containerSelector = `
                        <div class="mb-3">
                            <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Container</label>
                            <select class="container-select w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                                <option value="mp4">MP4</option>
                                <option value="webm">WebM</option>
                                <option value="mkv">MKV</option>
                            </select>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="px-2 py-1 bg-blue-50 text-blue-700 text-xs font-semibold rounded-full">${format.ext.toUpperCase()}</span>
                        <span class="text-xs text-gray-400">${typeLabel}</span>
                    </div>
                    <div class="mb-2">
                        <p class="text-base sm:text-lg font-bold text-gray-800">${format.quality || 'N/A'}</p>
                        <p class="text-xs sm:text-sm text-gray-500">${filesize}</p>
                    </div>
                    ${detailStr ? `<p class="text-xs text-gray-600 mb-3">${detailStr}</p>` : ''}
                    <div class="mb-3">
                        <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Filename</label>
                        <input type="text" class="filename-input w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" 
                               placeholder="My video" value="${sanitizeFilename(info.title)}">
                    </div>
                    ${containerSelector}
                    <button onclick="startDownload('${format.format_id}', this)" 
                            class="download-btn w-full bg-green-50 hover:bg-green-100 text-green-700 font-medium py-3 sm:py-2 px-4 rounded-lg transition border border-green-200 text-sm sm:text-base">
                        Download
                    </button>
                `;
                formatsContainer.appendChild(card);
            });
            videoView.classList.remove('hidden');
        }

        function sanitizeFilename(name) {
            return name.replace(/[^\w\s-]/g, '').trim();
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        async function startDownload(formatId, btnElement) {
            if (!currentVideoUrl) {
                showError('Video URL missing.');
                return;
            }

            const card = btnElement.closest('.format-card');
            const filenameInput = card.querySelector('.filename-input');
            const customFilename = filenameInput ? filenameInput.value.trim() : '';
            
            const containerSelect = card.querySelector('.container-select');
            const container = containerSelect ? containerSelect.value : 'mp4';

            btnElement.disabled = true;
            btnElement.textContent = 'Starting...';

            try {
                const response = await fetch('/start_download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: currentVideoUrl,
                        format_id: formatId,
                        custom_filename: customFilename,
                        container: container,
                        start_time: '',
                        end_time: '',
                        audio_only: false,
                        audio_bitrate: '192k',
                        subtitle_langs: '',
                        thumbnail: false
                    })
                });

                const data = await handleResponse(response);
                
                currentTaskId = data.task_id;
                progressModal.classList.remove('hidden');
                progressBar.style.width = '0%';
                progressStatus.textContent = 'Starting...';
                pollInterval = setInterval(() => pollProgress(currentTaskId), 500);
            } catch (error) {
                showError(error.message);
                btnElement.disabled = false;
                btnElement.textContent = 'Download';
            }
        }

        async function pollProgress(taskId) {
            try {
                const response = await fetch(`/progress/${taskId}`);
                const data = await handleResponse(response);

                const progress = data.progress || 0;
                progressBar.style.width = progress + '%';
                progressStatus.textContent = data.status === 'downloading' ? `Downloading... ${progress}%` : data.status;

                if (data.status === 'done') {
                    clearInterval(pollInterval);
                    progressStatus.textContent = 'Complete! Preparing file...';
                    window.location.href = `/download_file/${taskId}`;
                    setTimeout(() => {
                        progressModal.classList.add('hidden');
                        document.querySelectorAll('.download-btn').forEach(btn => {
                            btn.disabled = false;
                            btn.textContent = 'Download';
                        });
                    }, 2000);
                } else if (data.status === 'error') {
                    clearInterval(pollInterval);
                    showError(data.error || 'Download failed');
                    progressModal.classList.add('hidden');
                    document.querySelectorAll('.download-btn').forEach(btn => {
                        btn.disabled = false;
                        btn.textContent = 'Download';
                    });
                }
            } catch (error) {
                clearInterval(pollInterval);
                showError('Progress check failed: ' + error.message);
                progressModal.classList.add('hidden');
                document.querySelectorAll('.download-btn').forEach(btn => {
                    btn.disabled = false;
                    btn.textContent = 'Download';
                });
            }
        }

        function cancelDownload() {
            if (currentTaskId && pollInterval) {
                clearInterval(pollInterval);
                progressModal.classList.add('hidden');
                document.querySelectorAll('.download-btn').forEach(btn => {
                    btn.disabled = false;
                    btn.textContent = 'Download';
                });
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            errorDiv.classList.add('hidden');
        }

        // Enter key
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchInfo();
        });
    </script>
</body>
</html>
